name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时触发
  push:
    branches: ["main", "master"]
  # 允许手动触发
  workflow_dispatch:

# 设置 GitHub Token 权限，允许向 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 确保并发运行时同一时间只会进行一次部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 我们上传 vite 构建生成的 dist 目录
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
